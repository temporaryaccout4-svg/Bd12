<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Samiksha 💖</title>

<style>

html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family:Segoe UI;
  background:black;
  color:white;
}

/* SCREEN */
.screen{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  box-sizing:border-box;
}

/* HIDDEN */
.hidden{display:none;}

/* BUTTON */
button{
  padding:14px 25px;
  border-radius:30px;
  border:none;
  background:linear-gradient(45deg,pink,cyan);
  color:white;
  margin-top:15px;
}

/* LOGIN */
#login{
  background:radial-gradient(circle,#000,#1a1a2f);
}

/* PROPOSAL CARD */
#proposal{
  background:black;
  text-align:left;
  align-items:flex-start;
  justify-content:flex-start;
  padding:30px;
  overflow-y:auto;
}

#proposal h1{
  font-size:7vw;
  color:pink;
  text-align:center;
  width:100%;
}

#proposal p{
  font-size:4.5vw;
  line-height:1.8;
  white-space:pre-line;
}

/* COUNTDOWN */
#count{
  font-size:22vw;
  animation:zoom 0.8s infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.3);}
}

/* FLASH */
.flash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  animation:fade 0.5s;
}

@keyframes fade{
  from{opacity:1;}
  to{opacity:0;}
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen">
  <h1>🔐 SECRET ACCESS</h1>
  <input id="pass" placeholder="Enter Password">
  <button onclick="check()">Unlock</button>
</div>

<!-- BIRTHDAY WISH -->
<div id="main" class="screen hidden">

  <h1>Happy Birthday Samiksha 💖</h1>

  <p id="wish"></p>

  <button onclick="startCountdown()">Tap for Surprise 💖</button>
</div>

<!-- COUNTDOWN -->
<div id="countScreen" class="screen hidden">
  <h1 id="count">5</h1>
</div>

<!-- PROPOSAL CARD -->
<div id="proposal" class="screen hidden">

  <h1>💌 My Heart For You</h1>

  <p id="proposalText"></p>

</div>

<!-- AUDIO -->
<audio id="boom"><source src="boom.mp3"></audio>

<script>

/* PASSWORD */
function check(){

  let p=document.getElementById("pass").value.trim().toLowerCase();

  if(p==="angry bird"){

    // SHOW BIRTHDAY FIRST
    document.getElementById("login").style.display="none";
    document.getElementById("main").classList.remove("hidden");

    // BOOM SOUND
    document.getElementById("boom").play();

    // YOUR EXACT WISH
    let wish=`Wishing you a very happy and joyful birthday 🎂💗
May your life always be filled with happiness, love, and success.
May all your dreams and wishes come true.
It’s not just your birthday… it’s the day someone special like you came into this world and made my life better in many ways.
You’ve become someone really special to me. Stay the same, my favourite Angry Bird 🐦❤️
Once again, happy birthday to my special person 💗✨`;

    document.getElementById("wish").innerText=wish;
  }
}

/* COUNTDOWN */
function startCountdown(){

  document.getElementById("main").style.display="none";
  document.getElementById("countScreen").classList.remove("hidden");

  let c=5;

  let x=setInterval(()=>{

    c--;
    document.getElementById("count").innerText=c;

    if(c===0){
      clearInterval(x);

      document.getElementById("countScreen").style.display="none";

      // SHOW PROPOSAL CARD AFTER DELAY (IMPORTANT)
      setTimeout(()=>{

        document.getElementById("proposal").classList.remove("hidden");

        typeProposal();

        // START MAKHAMALI MUSIC ONLY HERE
        let m=new Audio("makhamali.mp3");
        m.loop=true;

        setTimeout(()=>{
          m.play();
        },1000);

      },1500);
    }
  },1000);
}

/* PROPOSAL TEXT (SLOW REVEAL) */
let proposalText=`I never planned this feeling…

But you became someone I can’t ignore.

You are not just special to me…
you are peace in my chaos 💖

I don’t know what future holds…
But I just know I want you in it.`;

let i=0;

function typeProposal(){

  let box=document.getElementById("proposalText");

  let t=setInterval(()=>{

    box.innerText+=proposalText.charAt(i);
    i++;

    if(i>=proposalText.length){
      clearInterval(t);
    }

  },50);
}

</script>

</body>
</html>
